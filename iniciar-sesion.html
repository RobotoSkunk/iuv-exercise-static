<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Iniciar Sesión</title>

	<link rel="stylesheet" href="/assets/css/login.css">
	<script src="/assets/js/login.js" defer></script>
</head>

<img
	src="/assets/img/lion.svg"
	alt=""
	class="lion"
	draggable="false"
/>
<img
	src="/assets/img/shield.svg"
	alt=""
	class="shield"
	height="220"
	draggable="false"
/>

<form method="POST">
	<h1>INICIO DE SESIÓN DEL EMPLEADO</h1>

	<label for="user-id">
		<input
			type="text"
			name="serial"
			id="user-id"
			placeholder=" "
			required
		/>
		<span>Clave de Empleado</span>
	</label>

	<label for="password">
		<input
			type="password"
			name="password"
			id="password"
			placeholder=" "
			required
		/>
		<span>Contraseña</span>
		<button class="raw" id="show-password">
			<img
				id="eye-icon"
				src="/assets/icon/eye.svg"
				alt="Mostrar contraseña"
				width="32"
				height="32"
			/>
		</button>
	</label>

	<button>Autenticar</button>
</form>
